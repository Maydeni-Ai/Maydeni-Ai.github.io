<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D6B6E"/>
      <stop offset="50%" style="stop-color:#1B9EA1"/>
      <stop offset="100%" style="stop-color:#4DC9D9"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B9EA1"/>
      <stop offset="100%" style="stop-color:#5DD8E8"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D6B6E"/>
      <stop offset="100%" style="stop-color:#4DC9D9"/>
    </linearGradient>
  </defs>
  <!-- M Wave Shape -->
  <path d="M10,75 C20,75 25,55 35,40 C45,25 50,50 60,65 C70,80 75,55 85,35 C90,25 92,20 95,20" 
        stroke="url(#waveGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Upward Arrow -->
  <path d="M85,35 L95,20 L105,15" stroke="url(#arrowGrad)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="105,8 112,18 105,15 98,22" fill="url(#arrowGrad)"/>
  <!-- AI Neural Icon -->
  <circle cx="108" cy="8" r="4" fill="url(#aiGrad)" opacity="0.9"/>
  <circle cx="118" cy="14" r="2.5" fill="#4DC9D9" opacity="0.7"/>
  <circle cx="100" cy="5" r="2" fill="#1B9EA1" opacity="0.6"/>
  <line x1="108" y1="8" x2="118" y2="14" stroke="#4DC9D9" stroke-width="0.8" opacity="0.5"/>
  <line x1="108" y1="8" x2="100" y2="5" stroke="#1B9EA1" stroke-width="0.8" opacity="0.5"/>
  <!-- AI Label -->
  <text x="113" y="8" font-family="Inter,sans-serif" font-weight="800" font-size="9" fill="#0D6B6E">AI</text>
  <!-- MAYDANI Text -->
  <text x="130" y="62" font-family="Inter,sans-serif" font-weight="900" font-size="52" fill="#1A2332" letter-spacing="2">MAYDANI</text>
  <!-- Tagline -->
  <text x="130" y="82" font-family="Inter,sans-serif" font-weight="600" font-size="11" fill="#1B9EA1" letter-spacing="4" text-transform="uppercase">SMART FIELD OPERATIONS</text>
  <!-- Subtle circuit lines -->
  <line x1="130" y1="92" x2="420" y2="92" stroke="#1B9EA1" stroke-width="0.5" opacity="0.15"/>
  <circle cx="180" cy="92" r="1.5" fill="#4DC9D9" opacity="0.2"/>
  <circle cx="280" cy="92" r="1.5" fill="#4DC9D9" opacity="0.2"/>
  <circle cx="380" cy="92" r="1.5" fill="#4DC9D9" opacity="0.2"/>
</svg>
